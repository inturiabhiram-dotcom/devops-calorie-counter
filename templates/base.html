<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <title>Calorie Counter</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="{% static 'css/base.css' %}" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F5F0E8;
      --sage: #7C9A7E;
      --warm-brown: #8B6F47;
      --charcoal: #2C2C2C;
      --light-bg: #FAFAF7;
      --accent: #C4956A;
      --text-muted: #8A8A8A;
      --white: #FFFFFF;
      --nav-height: 72px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--light-bg);
      color: var(--charcoal);
      min-height: 100vh;
    }

    /* NAVBAR */
    .main-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: var(--nav-height);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      padding: 0 48px;
      justify-content: space-between;
    }

    .nav-logo a {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--charcoal);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .nav-logo a span { color: var(--sage); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      list-style: none;
    }

    .nav-links li a {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 100px;
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
    }

    .nav-links li a:hover,
    .nav-links li a.active {
      color: var(--charcoal);
      background: var(--cream);
    }

    .nav-toggler {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
      padding: 8px;
    }
    .nav-toggler span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--charcoal);
      border-radius: 2px;
      transition: all 0.3s;
    }

    @media (max-width: 768px) {
      .main-nav { padding: 0 24px; }
      .nav-toggler { display: flex; }
      .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-height);
        left: 0; right: 0;
        background: white;
        flex-direction: column;
        padding: 16px 24px;
        border-bottom: 1px solid rgba(0,0,0,0.06);
        gap: 4px;
      }
      .nav-links.open { display: flex; }
    }

    /* PAGE WRAPPER */
    .page-wrapper {
      padding-top: var(--nav-height);
      min-height: 100vh;
    }

    /* BUTTONS */
    .btn-primary-custom {
      background: var(--charcoal);
      color: var(--white);
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
    }
    .btn-primary-custom:hover {
      background: var(--warm-brown);
      transform: translateY(-1px);
    }

    .btn-accent {
      background: var(--sage);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-accent:hover { background: #6a8a6c; transform: translateY(-1px); }

    /* FORMS */
    input[type="text"], input[type="password"], input[type="email"],
    input[type="number"], select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E5E5E5;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--charcoal);
      background: white;
      transition: border-color 0.2s;
      outline: none;
      margin-bottom: 12px;
    }
    input[type="text"]:focus, input[type="password"]:focus,
    input[type="email"]:focus, input[type="number"]:focus,
    select:focus, textarea:focus {
      border-color: var(--sage);
    }

    /* TABLES */
    .pro-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .pro-table thead th {
      background: var(--charcoal);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 14px 20px;
      text-align: left;
    }
    .pro-table tbody td {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid #F0F0F0;
      color: var(--charcoal);
    }
    .pro-table tbody tr:last-child td { border-bottom: none; }
    .pro-table tbody tr:hover td { background: var(--cream); }

    /* CARDS */
    .stat-card {
      background: white;
      border-radius: 16px;
      padding: 28px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      color: var(--charcoal);
      line-height: 1;
    }
  </style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-logo">
    <a href="{% url 'home' %}">Calorie<span>Tracker</span></a>
  </div>
  <button class="nav-toggler" onclick="document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    {% with url_name=request.resolver_match.url_name %}
    <li><a href="{% url 'home' %}" class="{% if url_name == 'home' %}active{% endif %}">Home</a></li>
    <li><a href="{% url 'profile' %}" class="{% if url_name == 'profile' %}active{% endif %}">Profile</a></li>
    <li><a href="{% url 'add_food' %}" class="{% if url_name == 'add_food' %}active{% endif %}">Add Food</a></li>
    <li><a href="{% url 'select_food' %}" class="{% if url_name == 'select_food' %}active{% endif %}">Select Food</a></li>
    {% endwith %}
  </ul>
</nav>

<div class="page-wrapper">
  {% block content %}{% endblock content %}
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</body>
</html>
